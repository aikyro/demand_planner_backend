# =============================================================================
# Minimal Docker Compose for Demand Planner Backend + ADK
# =============================================================================
# Uses external PostgreSQL and Redis (no database containers needed)
# Control everything via .env file (comment/uncomment sections)

services:
  # =============================================================================
  # FastAPI Backend Service
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demand-planner-backend
    env_file:
      - ./backend/.env
    depends_on:
      adk-service:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Mount entire backend directory (source code + config)
      - ./backend:/app
      # Explicit mount for temp uploads (ensure sync on Windows)
      - ./backend/tmp:/app/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend-network
    restart: unless-stopped
    extra_hosts:
      # Allow container to reach Redis on host machine
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "if [ '$ENV' = 'development' ]; then
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop;
      fi"

  # =============================================================================
  # Celery Worker (Async Task Processing)
  # =============================================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demand-planner-celery-worker
    env_file:
      - ./backend/.env
    volumes:
      # Mount entire backend directory (source code + config)
      - ./backend:/app
      # Explicit mount for temp uploads (ensure sync on Windows)
      - ./backend/tmp:/app/tmp
    networks:
      - backend-network
    restart: unless-stopped
    extra_hosts:
      # Allow container to reach Redis on host machine
      - "host.docker.internal:host-gateway"
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000
      --time-limit=300
      --soft-time-limit=280

  # =============================================================================
  # ADK Service (Demand Forecasting Agent)
  # =============================================================================
  adk-service:
    build:
      context: ../demand_forecasting_adk
      dockerfile: Dockerfile
    container_name: demand-planner-adk
    env_file:
      - ../demand_forecasting_adk/demand_forecasting_agent/.env
    ports:
      - "${ADK_PORT:-9000}:9000"
    volumes:
      # Mount ADK source code directory (for hot-reload of code changes)
      - ../demand_forecasting_adk/demand_forecasting_agent:/app/demand_forecasting_agent
      - ../demand_forecasting_adk/server.py:/app/server.py
      # Artifacts and output directories
      - ../demand_forecasting_adk/.adk/artifacts:/app/.adk/artifacts
      - ../demand_forecasting_adk/generated_forecast:/app/generated_forecast
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - backend-network
    restart: unless-stopped
    extra_hosts:
      # Allow container to reach Redis on host machine
      - "host.docker.internal:host-gateway"

# =============================================================================
# Networks
# =============================================================================
networks:
  backend-network:
    driver: bridge
    name: demand-planner-network

# =============================================================================
# Volumes (Persistent Data)
# =============================================================================
# Artifacts are now mounted from local folder, no named volume needed
