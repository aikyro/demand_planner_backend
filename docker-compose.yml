services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports: ["1025:1025", "8025:8025"]

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["./backend:/code"]

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes: ["./backend:/code"]

  # ADK Service for Demand Forecasting Agent
  adk-service:
    build:
      context: ../Demand_forcasting_adk
    env_file: ../Demand_forcasting_adk/demand_forecasting_agent/.env
    environment:
      - GOOGLE_GENAI_USE_VERTEXAI=False
      # ADK_SECRET is read from .env file
    depends_on: [postgres]
    ports: ["9000:9000"]
    volumes:
      - adk_data:/app/data
      # Development: Mount artifacts to local folder (set ARTIFACTS_DIR in .env)
      # For production, use named volume: adk_artifacts:/app/.adk/artifacts
      - ../Demand_forcasting_adk/.adk/artifacts:/app/.adk/artifacts

volumes:
  pgdata:
  adk_artifacts:
  adk_data:
